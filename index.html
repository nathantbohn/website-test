<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SeanSimulator 2.0</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    canvas.active {
      opacity: 1;
    }

    .heading-wrap {
      position: relative;
      z-index: 10;
      text-align: center;
      cursor: default;
      user-select: none;
    }

    @keyframes marble {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    h1 {
      font-size: clamp(2.8rem, 8vw, 7rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #fff;
      transition: text-shadow 0.4s ease;
    }

    .heading-wrap:hover h1 {
      color: transparent;
      -webkit-text-fill-color: transparent;
      background-image: linear-gradient(
        135deg,
        #fff     0%,
        #38bdf8  12%,
        #a855f7  25%,
        #2dd4bf  38%,
        #e879f9  52%,
        #4facfe  65%,
        #c4b5fd  78%,
        #f0abfc  88%,
        #fff     100%
      );
      background-size: 300% 300%;
      -webkit-background-clip: text;
      background-clip: text;
      animation: marble 4s ease infinite;
      text-shadow:
        0 0 30px rgba(168, 85, 247, 0.6),
        0 0 70px rgba(56, 189, 248, 0.4),
        0 0 120px rgba(232, 121, 249, 0.25);
    }

    .subtitle {
      margin-top: 1rem;
      font-size: clamp(0.85rem, 2vw, 1.1rem);
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.35);
      transition: color 0.4s ease;
    }

    .heading-wrap:hover .subtitle {
      color: rgba(196, 181, 253, 0.7);
    }
  </style>
</head>
<body>
  <canvas id="stars"></canvas>

  <div class="heading-wrap" id="heading">
    <h1>SeanSimulator 2.0</h1>
    <p class="subtitle">Coming Soon</p>
  </div>

  <script>
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    const heading = document.getElementById('heading');

    let W, H, cx, cy;
    let stars = [];
    let animId = null;
    let active = false;
    let progress = 0; // 0 = idle, 1 = full warp

    const STAR_COUNT = 600;

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      cx = W / 2;
      cy = H / 2;
    }

    function randRange(min, max) {
      return Math.random() * (max - min) + min;
    }

    function initStars() {
      stars = [];
      for (let i = 0; i < STAR_COUNT; i++) {
        // Spread stars across the full canvas (not just from center)
        const angle = Math.random() * Math.PI * 2;
        const radius = Math.random() * Math.max(W, H) * 0.6 + 10;
        stars.push({
          angle,
          radius,
          speed: randRange(0.5, 4),
          size: randRange(0.5, 1.8),
          brightness: randRange(0.6, 1),
          color: pickColor(),
        });
      }
    }

    function pickColor() {
      const palette = [
        '#ffffff',
        '#c8e6ff',
        '#a0ccff',
        '#ffe8c8',
        '#ffd0a0',
      ];
      return palette[Math.floor(Math.random() * palette.length)];
    }

    function drawFrame() {
      ctx.clearRect(0, 0, W, H);

      // Ease progress toward target
      const target = active ? 1 : 0;
      progress += (target - progress) * 0.04;

      const speed = progress * progress; // ease in

      for (const s of stars) {
        s.radius += s.speed * speed * 18;

        // Wrap around if off screen
        const maxR = Math.sqrt(cx * cx + cy * cy) * 1.6;
        if (s.radius > maxR) {
          s.radius = 5;
          s.angle = Math.random() * Math.PI * 2;
        }

        const x = cx + Math.cos(s.angle) * s.radius;
        const y = cy + Math.sin(s.angle) * s.radius;

        // Streak length grows with speed
        const streakLen = speed * s.speed * 30;
        const x0 = cx + Math.cos(s.angle) * (s.radius - streakLen);
        const y0 = cy + Math.sin(s.angle) * (s.radius - streakLen);

        const alpha = Math.min(1, s.brightness * (0.4 + speed * 0.6));

        if (streakLen > 1) {
          const grad = ctx.createLinearGradient(x0, y0, x, y);
          grad.addColorStop(0, 'rgba(0,0,0,0)');
          grad.addColorStop(1, hexToRgba(s.color, alpha));
          ctx.strokeStyle = grad;
          ctx.lineWidth = s.size * (1 + speed * 1.5);
          ctx.beginPath();
          ctx.moveTo(x0, y0);
          ctx.lineTo(x, y);
          ctx.stroke();
        } else {
          ctx.fillStyle = hexToRgba(s.color, alpha);
          ctx.beginPath();
          ctx.arc(x, y, s.size, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      // Keep animating while transitioning
      if (Math.abs(progress - target) > 0.001 || active) {
        animId = requestAnimationFrame(drawFrame);
      } else {
        // Fully idle — stop loop
        animId = null;
      }
    }

    function hexToRgba(hex, alpha) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r},${g},${b},${alpha})`;
    }

    function startWarp() {
      active = true;
      canvas.classList.add('active');
      if (!animId) {
        animId = requestAnimationFrame(drawFrame);
      }
    }

    function stopWarp() {
      active = false;
      canvas.classList.remove('active');
      if (!animId) {
        animId = requestAnimationFrame(drawFrame);
      }
    }

    heading.addEventListener('mouseenter', startWarp);
    heading.addEventListener('mouseleave', stopWarp);

    window.addEventListener('resize', () => {
      resize();
      initStars();
    });

    resize();
    initStars();
  </script>
</body>
</html>
