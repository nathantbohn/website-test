<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SeanSimulator 2.0</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    #matrix {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
      opacity: 1;
      transition: opacity 0.6s ease;
    }

    #matrix.hidden {
      opacity: 0;
    }

    #stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    #stars.active {
      opacity: 1;
    }

    .heading-wrap {
      position: relative;
      z-index: 10;
      text-align: center;
      cursor: default;
      user-select: none;
    }

    @keyframes marble {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    h1 {
      font-size: clamp(2.8rem, 8vw, 7rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #fff;
      transition: text-shadow 0.4s ease;
    }

    .heading-wrap:hover h1 {
      color: transparent;
      -webkit-text-fill-color: transparent;
      background-image: linear-gradient(
        135deg,
        #fff     0%,
        #38bdf8  10%,
        #a855f7  22%,
        #39ff14  35%,
        #2dd4bf  47%,
        #e879f9  58%,
        #00ff88  70%,
        #4facfe  80%,
        #c4b5fd  90%,
        #fff     100%
      );
      background-size: 300% 300%;
      -webkit-background-clip: text;
      background-clip: text;
      animation: marble 4s ease infinite;
      text-shadow:
        0 0 30px rgba(168, 85, 247, 0.6),
        0 0 70px rgba(56, 189, 248, 0.4),
        0 0 120px rgba(232, 121, 249, 0.25);
    }

    .subtitle {
      margin-top: 1rem;
      font-size: clamp(0.85rem, 2vw, 1.1rem);
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.35);
      transition: color 0.4s ease;
    }

    .heading-wrap:hover .subtitle {
      color: rgba(196, 181, 253, 0.7);
    }
  </style>
</head>
<body>
  <canvas id="matrix"></canvas>
  <canvas id="stars"></canvas>

  <div class="heading-wrap" id="heading">
    <h1>SeanSimulator 2.0</h1>
    <p class="subtitle">Coming Soon</p>
  </div>

  <script>
    // ── Matrix rain ───────────────────────────────────────────────────────────
    const matrixCanvas = document.getElementById('matrix');
    const mctx = matrixCanvas.getContext('2d');

    const SYMBOLS = Array.from(
      'αβγδεζηθλμξπρστφψω' +
      '∑∏∫∂∇√∞∈∉∪∩⊂⊃≈≠≤≥±×÷' +
      '∀∃ℕℝℂℤΔΩΦΨΛΣ∮⊕' +
      '012345689'
    );
    const FONT_SIZE = 16;
    let mW, mH, drops, dropSpeeds;

    function initMatrix() {
      mW = matrixCanvas.width = window.innerWidth;
      mH = matrixCanvas.height = window.innerHeight;
      const cols = Math.floor(mW / FONT_SIZE);
      drops = Array.from({ length: cols }, () => Math.random() * -(mH / FONT_SIZE));
      dropSpeeds = Array.from({ length: cols }, () => 0.25 + Math.random() * 0.65);
    }

    function drawMatrix() {
      // Fade previous frame — lower value = longer tail
      mctx.fillStyle = 'rgba(0, 0, 0, 0.04)';
      mctx.fillRect(0, 0, mW, mH);

      mctx.font = `${FONT_SIZE}px "Courier New", monospace`;

      for (let i = 0; i < drops.length; i++) {
        const char = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
        const x = i * FONT_SIZE;
        const y = Math.floor(drops[i]) * FONT_SIZE;

        // Head character slightly brighter/whiter
        const headAlpha = 0.55 + Math.random() * 0.35;
        mctx.fillStyle = `rgba(0, 220, 130, ${headAlpha})`;
        mctx.fillText(char, x, y);

        drops[i] += dropSpeeds[i];

        // Reset column when it exits the bottom
        if (drops[i] * FONT_SIZE > mH && Math.random() > 0.97) {
          drops[i] = Math.random() * -40;
          dropSpeeds[i] = 0.25 + Math.random() * 0.65;
        }
      }

      requestAnimationFrame(drawMatrix);
    }

    // ── Hyperspace stars ──────────────────────────────────────────────────────
    const starsCanvas = document.getElementById('stars');
    const ctx = starsCanvas.getContext('2d');
    const heading = document.getElementById('heading');

    let W, H, cx, cy;
    let stars = [];
    let animId = null;
    let active = false;
    let progress = 0;

    const STAR_COUNT = 600;

    function resize() {
      W = starsCanvas.width = window.innerWidth;
      H = starsCanvas.height = window.innerHeight;
      cx = W / 2;
      cy = H / 2;
    }

    function randRange(min, max) {
      return Math.random() * (max - min) + min;
    }

    function initStars() {
      stars = [];
      for (let i = 0; i < STAR_COUNT; i++) {
        const angle = Math.random() * Math.PI * 2;
        const radius = Math.random() * Math.max(W, H) * 0.6 + 10;
        stars.push({
          angle,
          radius,
          speed: randRange(0.5, 4),
          size: randRange(0.5, 1.8),
          brightness: randRange(0.6, 1),
          color: pickColor(),
        });
      }
    }

    function pickColor() {
      const palette = ['#ffffff', '#c8e6ff', '#a0ccff', '#ffe8c8', '#ffd0a0'];
      return palette[Math.floor(Math.random() * palette.length)];
    }

    function drawFrame() {
      ctx.clearRect(0, 0, W, H);

      const target = active ? 1 : 0;
      progress += (target - progress) * 0.04;
      const speed = progress * progress;

      for (const s of stars) {
        s.radius += s.speed * speed * 18;

        const maxR = Math.sqrt(cx * cx + cy * cy) * 1.6;
        if (s.radius > maxR) {
          s.radius = 5;
          s.angle = Math.random() * Math.PI * 2;
        }

        const x = cx + Math.cos(s.angle) * s.radius;
        const y = cy + Math.sin(s.angle) * s.radius;
        const streakLen = speed * s.speed * 30;
        const x0 = cx + Math.cos(s.angle) * (s.radius - streakLen);
        const y0 = cy + Math.sin(s.angle) * (s.radius - streakLen);
        const alpha = Math.min(1, s.brightness * (0.4 + speed * 0.6));

        if (streakLen > 1) {
          const grad = ctx.createLinearGradient(x0, y0, x, y);
          grad.addColorStop(0, 'rgba(0,0,0,0)');
          grad.addColorStop(1, hexToRgba(s.color, alpha));
          ctx.strokeStyle = grad;
          ctx.lineWidth = s.size * (1 + speed * 1.5);
          ctx.beginPath();
          ctx.moveTo(x0, y0);
          ctx.lineTo(x, y);
          ctx.stroke();
        } else {
          ctx.fillStyle = hexToRgba(s.color, alpha);
          ctx.beginPath();
          ctx.arc(x, y, s.size, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      if (Math.abs(progress - target) > 0.001 || active) {
        animId = requestAnimationFrame(drawFrame);
      } else {
        animId = null;
      }
    }

    function hexToRgba(hex, alpha) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r},${g},${b},${alpha})`;
    }

    function startWarp() {
      active = true;
      starsCanvas.classList.add('active');
      matrixCanvas.classList.add('hidden');
      if (!animId) animId = requestAnimationFrame(drawFrame);
    }

    function stopWarp() {
      active = false;
      starsCanvas.classList.remove('active');
      matrixCanvas.classList.remove('hidden');
      if (!animId) animId = requestAnimationFrame(drawFrame);
    }

    heading.addEventListener('mouseenter', startWarp);
    heading.addEventListener('mouseleave', stopWarp);

    window.addEventListener('resize', () => {
      resize();
      initStars();
      initMatrix();
    });

    resize();
    initStars();
    initMatrix();
    drawMatrix();
  </script>
</body>
</html>
